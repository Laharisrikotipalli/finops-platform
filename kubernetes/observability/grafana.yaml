apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.monitoring.svc.cluster.local:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: finops
        orgId: 1
        folder: FinOps
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-finops
  namespace: monitoring
data:
  finops-overview.json: |
    {
      "title": "FinOps Cost Overview",
      "timezone": "utc",
      "panels": [
        {
          "id": 1,
          "title": "Total Cluster Cost per Day",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(kubecost_cluster_management_cost) + sum(node_total_hourly_cost) * 24"
            }
          ]
        },
        {
          "id": 2,
          "title": "Cost Breakdown by Namespace",
          "type": "bargauge",
          "targets": [
            {
              "expr": "sum by (namespace) (kubecost_namespace_cost_total)"
            }
          ]
        },
        {
          "id": 3,
          "title": "Cost Breakdown by Team",
          "type": "piechart",
          "targets": [
            {
              "expr": "sum by (label_team) (kubecost_pod_cost_total)"
            }
          ]
        },
        {
          "id": 4,
          "title": "Cluster Efficiency (Requested vs Used)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total[5m])) / sum(kube_pod_container_resource_requests{resource=\"cpu\"})"
            },
            {
              "expr": "sum(container_memory_working_set_bytes) / sum(kube_pod_container_resource_requests{resource=\"memory\"})"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      nodeSelector:
        lifecycle: on-demand
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-finops
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
