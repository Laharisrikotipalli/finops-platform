global:
  clusterId: finops-platform
  prometheus:
    enabled: true
  grafana:
    enabled: true

serviceAccount:
  create: true
  name: kubecost-cost-analyzer
  annotations:
    eks.amazonaws.com/role-arn: "${KUBECOST_IRSA_ROLE_ARN}"

nodeSelector:
  lifecycle: on-demand

tolerations:
  - key: "spotInstance"
    operator: "Exists"
    effect: "PreferNoSchedule"

kubecostProductConfigs:
  clusterName: finops-platform
  cloudProvider: AWS

persistentVolume:
  enabled: true
  size: 32Gi
  storageClass: gp2

prometheus:
  server:
    persistentVolume:
      enabled: true
      size: 32Gi
      storageClass: gp2
    nodeSelector:
      lifecycle: on-demand
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi

kubecostMetrics:
  emitPodAnnotations: true
  emitNamespaceAnnotations: true

networkCosts:
  enabled: true

reporting:
  productAnalytics: false
  errorReporting: false

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi
kubecostAggregator:
  cloudCost:
    enabled: false
