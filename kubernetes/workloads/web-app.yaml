apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-webapp
  namespace: default
  labels:
    app: frontend-webapp
    team: frontend
    environment: production
    cost-center: "cc-101"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend-webapp
  template:
    metadata:
      labels:
        app: frontend-webapp
        team: frontend
        environment: production
        cost-center: "cc-101"
    spec:
      nodeSelector:
        lifecycle: spot
      tolerations:
        - key: "spotInstance"
          operator: "Exists"
          effect: "PreferNoSchedule"
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-webapp
  namespace: default
  labels:
    team: frontend
spec:
  selector:
    app: frontend-webapp
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
